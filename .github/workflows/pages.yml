name: GitHub Pages — Sweep Visualizations

on:
  workflow_run:
    workflows: ["CD — Sweep Experiments & Results"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy-pages:
    name: Build and deploy GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download sweep results artifact
        uses: actions/download-artifact@v4
        with:
          name: sweep-results-${{ github.event.workflow_run.head_sha || github.sha }}
          path: docs/results
        continue-on-error: true

      - name: Copy existing plots to docs
        run: |
          mkdir -p docs/results
          cp -f alpha_vs_eps.png docs/results/ 2>/dev/null || true
          cp -f heatmap_recovery_kick.png docs/results/ 2>/dev/null || true
          cp -f *.png docs/results/ 2>/dev/null || true

      - name: Generate interactive index page
        run: |
          python3 - <<'PYEOF'
          import os, glob, datetime

          result_dir = "docs/results"
          os.makedirs(result_dir, exist_ok=True)

          images = sorted(glob.glob(os.path.join(result_dir, "*.png")))
          image_cards = ""
          for img in images:
              fname = os.path.basename(img)
              label = fname.replace("_", " ").replace(".png", "").title()
              image_cards += f"""
              <div class="card">
                <h3>{label}</h3>
                <img src="results/{fname}" alt="{label}" loading="lazy">
              </div>"""

          if not image_cards:
              image_cards = '<p class="no-results">No sweep results available yet. Run the CD workflow to generate plots.</p>'

          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Kernel — Sweep Experiment Results</title>
            <style>
              body {{ font-family: system-ui, sans-serif; margin: 0; background: #0d1117; color: #c9d1d9; }}
              header {{ background: #161b22; padding: 1.5rem 2rem; border-bottom: 1px solid #30363d; }}
              header h1 {{ margin: 0; font-size: 1.6rem; color: #58a6ff; }}
              header p {{ margin: 0.3rem 0 0; color: #8b949e; font-size: 0.9rem; }}
              main {{ padding: 2rem; max-width: 1200px; margin: 0 auto; }}
              h2 {{ color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 0.4rem; }}
              .grid {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; }}
              .card {{ background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; }}
              .card h3 {{ margin: 0 0 0.75rem; color: #e3b341; font-size: 1rem; }}
              .card img {{ width: 100%; border-radius: 4px; }}
              .no-results {{ color: #8b949e; font-style: italic; }}
              footer {{ text-align: center; padding: 1.5rem; color: #8b949e; font-size: 0.8rem;
                        border-top: 1px solid #30363d; margin-top: 2rem; }}
            </style>
          </head>
          <body>
            <header>
              <h1>⚛ Kernel — Sweep Experiment Results</h1>
              <p>Automated coherence sweep heatmaps and scaling falsification plots · Updated: {now}</p>
            </header>
            <main>
              <h2>Sweep Heatmaps &amp; Scaling Plots</h2>
              <div class="grid">
                {image_cards}
              </div>
            </main>
            <footer>Generated by GitHub Actions · <a href="https://github.com/beanapologist/Kernel" style="color:#58a6ff">beanapologist/Kernel</a></footer>
          </body>
          </html>"""

          with open("docs/index.html", "w") as f:
              f.write(html)
          print("Generated docs/index.html")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
