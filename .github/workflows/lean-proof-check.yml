name: Lean Proof Check

on:
  push:
    branches: [main]
    paths:
      - 'formal-lean/**'
      - '.github/workflows/lean-proof-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'formal-lean/**'
      - '.github/workflows/lean-proof-check.yml'

permissions:
  contents: read

jobs:
  proof-check:
    name: Check Lean proofs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Lean toolchain
        working-directory: formal-lean
        run: elan toolchain install "$(cat lean-toolchain)"

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            formal-lean/.lake/packages
            ~/.elan
          key: lean-${{ hashFiles('formal-lean/lean-toolchain', 'formal-lean/lakefile.lean') }}
          restore-keys: lean-

      - name: Download pre-built Mathlib cache
        working-directory: formal-lean
        continue-on-error: true
        run: lake exe cache get

      - name: Build and verify all Lean proofs
        working-directory: formal-lean
        run: lake build
